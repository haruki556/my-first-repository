<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>自己紹介</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: radial-gradient(circle at top, #e0f2ff, #f7f7ff);
        color: #222;
      }
      .card {
        background: #ffffff;
        padding: 32px 28px;
        border-radius: 18px;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.15);
        max-width: 480px;
        width: 90%;
      }
      .title {
        font-size: 26px;
        margin: 0 0 8px;
      }
      .subtitle {
        margin: 0 0 20px;
        color: #64748b;
        font-size: 14px;
      }
      .section-title {
        font-size: 16px;
        margin: 20px 0 8px;
        color: #0f172a;
      }
      ul {
        padding-left: 20px;
        margin: 0;
      }
      li {
        margin-bottom: 4px;
      }
      .tag-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 8px;
      }
      .tag {
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 12px;
        background: #eff6ff;
        color: #1d4ed8;
      }
      .footer {
        margin-top: 24px;
        font-size: 12px;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <header>
        <h1 class="title">こんにちは！</h1>
        <p class="subtitle">
          ここに自己紹介を書いていきます。お好きなように書きかえてください。
        </p>
      </header>

      <section>
        <h2 class="section-title">名前</h2>
        <p>あなたの名前を書きましょう（例：山田 太郎）。</p>
      </section>

      <section>
        <h2 class="section-title">好きなこと</h2>
        <ul>
          <li>ゲーム</li>
          <li>音楽</li>
          <li>プログラミングの勉強</li>
        </ul>
      </section>

      <section>
        <h2 class="section-title">ひとこと</h2>
        <p>
          自分らしい一言メッセージを書いてみましょう。<br />
          例：「毎日少しずつプログラミングをがんばります！」
        </p>
      </section>

      <section>
        <h2 class="section-title">今興味があること</h2>
        <div class="tag-list">
          <span class="tag">HTML</span>
          <span class="tag">CSS</span>
          <span class="tag">JavaScript</span>
        </div>
      </section>

      <p class="footer">
        このページは Cursor と HTML の練習として作成しました。
      </p>
    </main>
  </body>
</html>
