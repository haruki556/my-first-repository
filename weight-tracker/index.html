<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>体重トラッカー</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>体重トラッカー</h1>
      <p class="sub">自分専用のローカル記録アプリ（保存先: このブラウザ）</p>

      <section class="card">
        <h2>記録を追加</h2>
        <form id="entry-form" class="grid">
          <label>
            日付
            <input type="date" id="date" required />
          </label>
          <label>
            体重 (kg)
            <input type="number" id="weight" step="0.1" min="20" max="300" required />
          </label>
          <label class="full">
            メモ (任意)
            <input type="text" id="note" maxlength="120" placeholder="例: 夜遅めに食事" />
          </label>
          <button type="submit">保存する</button>
        </form>
        <div class="reset-row">
          <button id="reset-all" class="danger" type="button">全データ削除</button>
        </div>
      </section>

      <section class="stats">
        <div class="stat-card">
          <span>最新</span>
          <strong id="latest-value">-</strong>
        </div>
        <div class="stat-card">
          <span>7日平均</span>
          <strong id="avg-value">-</strong>
        </div>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>推移グラフ</h2>
          <div class="csv-actions">
            <button id="download-csv" class="ghost">CSV出力</button>
            <input type="file" id="csv-import" accept=".csv" />
          </div>
        </div>
        <canvas id="chart" width="900" height="320" aria-label="体重推移グラフ"></canvas>
      </section>

      <section class="card">
        <h2>記録一覧</h2>
        <table>
          <thead>
            <tr>
              <th>日付</th>
              <th>体重 (kg)</th>
              <th>メモ</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="entries-body"></tbody>
        </table>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
